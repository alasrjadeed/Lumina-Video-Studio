name: lumina_mobile_app
description: "Lumina Video Studio - Mobile Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Video Player
  chewie: ^1.9.2
  video_player: ^2.9.3
  
  # UI
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Storage
  shared_preferences: ^2.3.4
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
